{% extends "base.html" %}
{% block title %}Admin Logs{% endblock %}
{% block page_title %}Admin Logs{% endblock %}

{% block content %}
<table border="1" cellpadding="10">
    <tr>
        <th>Username</th>
        <th>Login Time</th>
    </tr>

    {% for log in logs %}
    <tr>
        <td>{{ log[0] }}</td>
        <td>{{ log[1] }}</td>
    </tr>
    {% endfor %}
</table>
<a href="/admin">Back</a>
{% endblock %}
